[pytest]
# Evals spawn Claude Code subprocesses that write directly to stdout/stderr
# file descriptors, bypassing pytest's capture. Use --capture=no so pytest
# doesn't try to capture (and lose) that output. Redirect at the shell level
# when you need to save results — see scripts/run_evals.sh.
addopts = --capture=no -v
asyncio_mode = auto
timeout = 180
